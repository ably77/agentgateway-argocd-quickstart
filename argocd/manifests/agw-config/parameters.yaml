apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayParameters
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
spec:
  sharedExtensions:
    extauth:
      enabled: true
      deployment:
        spec:
          replicas: 1
          #template:
          #  spec:
          #    imagePullSecrets:
          #    - name: my-registry-secret
      image:
        registry: docker.io
        repository: ably7/ext-auth-service
        tag: "0.81.1"
    ratelimiter:
      enabled: true
      deployment:
        spec:
          replicas: 1
          #template:
          #  spec:
          #    imagePullSecrets:
          #    - name: my-registry-secret
      image:
        registry: docker.io
        repository: ably7/rate-limiter
        tag: "0.18.6"
    extCache:
      enabled: true
      deployment:
        spec:
          replicas: 1
          #template:
          #  spec:
          #    imagePullSecrets:
          #    - name: my-registry-secret
      image:
        registry: docker.io
        repository: ably7/redis
        tag: "8.6.2-alpine"
  logging:
    level: info
  image:
    registry: docker.io
    repository: ably7/agentgateway-enterprise
    tag: "2026.5.0"
  service:
    metadata:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    spec:
      type: LoadBalancer
  rawConfig:
    config:
      metrics:
        fields:
          add:
            user_id: 'request.headers["x-user-id"]'
  deployment:
    spec:
      replicas: 2
      template:
        spec:
          #imagePullSecrets:
          #- name: my-registry-secret
          containers:
          - name: agentgateway
            resources:
              requests:
                cpu: 300m
                memory: 128Mi
